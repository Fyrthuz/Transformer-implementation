name: mamba_swiglu_none

model:
  d_model: 64
  num_layers: 2
  dropout: 0.1
  stochastic_depth: 0.0

  attention:
    type: mamba
    num_heads: 4
    d_state: 8
    expand_factor: 2
    d_conv: 3

  ffn:
    type: swiglu
    d_ff: 128
    activation: gelu
    num_experts: 4
    top_k: 2

  position:
    type: none
    max_len: 5000

dataset:
  name: tinyshakespeare
  tokenization: char       # ← usa CharTokenizer (vocab ~66), vocab_size se ignora
  max_seq_len: 128
  train_stride: 32
  cache_dir: ./data
  max_train_chunks: 5000
  max_test_chunks: 500

training:
  batch_size: 64
  num_epochs: 100
  learning_rate: 0.001
  weight_decay: 0.01
  grad_clip: 1.0
  scheduler: cosine
  early_stop_patience: 15

  loss:
    type: cross_entropy
    label_smoothing: 0.05
    ignore_index: auto
