name: moe_linear

model:
  d_model: 256
  num_layers: 4
  dropout: 0.2
  attention_dropout: 0.2
  ffn_dropout: 0.1
  embedding_dropout: 0.1
  stochastic_depth: 0.1

  attention:
    type: linear
    num_heads: 8

  ffn:
    type: moe
    d_ff: 1024
    num_experts: 8
    top_k: 2

  position:
    type: sinusoidal
    max_len: 5000

dataset:
  name: wikitext2
  tokenization: bpe
  vocab_size: 4096
  max_seq_len: 128
  train_stride: 16
  cache_dir: ./data
  max_train_chunks: 35000
  max_test_chunks: 2000

training:
  batch_size: 64
  num_epochs: 50
  learning_rate: 0.0005
  weight_decay: 0.1
  grad_clip: 1.0
  scheduler: cosine
  early_stop_patience: 5

  loss:
    type: cross_entropy
    label_smoothing: 0.1
    ignore_index: auto
    moe_load_balance_coef: 0.01
