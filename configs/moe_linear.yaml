dataset:
  cache_dir: ./data
  max_seq_len: 128
  max_test_chunks: 5000
  max_train_chunks: 100000
  name: wikitext2
  tokenization: bpe
  train_stride: 16
  vocab_size: 4096
model:
  attention:
    num_heads: 8
    type: linear
  attention_dropout: 0.2
  d_model: 256
  dropout: 0.2
  embedding_dropout: 0.1
  ffn:
    d_ff: 1024
    num_experts: 8
    top_k: 2
    type: moe
  ffn_dropout: 0.1
  num_layers: 6
  position:
    max_len: 5000
    type: sinusoidal
  stochastic_depth: 0.1
name: moe_linear
training:
  batch_size: 64
  early_stop_patience: 5
  grad_clip: 1.0
  learning_rate: 0.0005
  loss:
    ignore_index: auto
    label_smoothing: 0.1
    moe_load_balance_coef: 0.01
    type: cross_entropy
  num_epochs: 50
  scheduler: cosine
  weight_decay: 0.1
