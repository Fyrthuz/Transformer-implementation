name: ultrafeedback_dpo
model:
  d_model: 256
  num_layers: 6
  dropout: 0.1
  attention:
    type: mha
    num_heads: 4
  ffn:
    type: swiglu
    d_ff: 768
  position:
    type: none
dataset:
  name: ultrafeedback
  tokenization: bpe
  vocab_size: 16000
  max_seq_len: 512
dpo:
  enabled: true
  beta: 0.1
  logging: tensorboard
  log_interval: 10
  save_steps: 500
  eval_steps: 500
  gradient_accumulation_steps: 2
training:
  batch_size: 4
  learning_rate: 0.000001
  weight_decay: 0.0
  warmup_steps: 50
  max_steps: 2000
  scheduler: warmup_cosine
  mixed_precision: bf16
seed: 42
