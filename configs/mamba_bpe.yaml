dataset:
  cache_dir: ./data
  max_seq_len: 128
  max_test_chunks: 5000
  max_train_chunks: 100000
  name: wikitext2
  tokenization: bpe
  train_stride: 16
  vocab_size: 4096
model:
  attention:
    d_conv: 4
    d_state: 16
    expand_factor: 2
    type: mamba
  d_model: 512
  dropout: 0.2
  embedding_dropout: 0.1
  ffn:
    activation: gelu
    d_ff: 2048
    type: standard
  ffn_dropout: 0.2
  num_layers: 7
  position:
    max_len: 5000
    type: none
  stochastic_depth: 0.1
name: mamba_bpe
training:
  batch_size: 64
  early_stop_patience: 5
  grad_clip: 1.0
  learning_rate: 0.0005
  loss:
    ignore_index: auto
    label_smoothing: 0.1
    type: cross_entropy
  num_epochs: 50
  scheduler: cosine
  weight_decay: 0.1
