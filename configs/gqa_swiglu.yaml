dataset:
  cache_dir: ./data
  max_seq_len: 128
  max_test_chunks: 5000
  max_train_chunks: 100000
  name: wikitext2
  tokenization: bpe
  train_stride: 16
  vocab_size: 4096
model:
  attention:
    num_heads: 8
    num_kv_heads: 2
    type: gqa
  attention_dropout: 0.2
  d_model: 512
  dropout: 0.2
  embedding_dropout: 0.1
  ffn:
    d_ff: 2048
    type: swiglu
  ffn_dropout: 0.2
  num_layers: 7
  position:
    max_len: 5000
    rope_theta: 10000.0
    type: rope
  stochastic_depth: 0.1
name: gqa_swiglu
training:
  batch_size: 64
  early_stop_patience: 5
  grad_clip: 1.0
  learning_rate: 0.0005
  loss:
    ignore_index: auto
    label_smoothing: 0.1
    type: cross_entropy
  num_epochs: 50
  scheduler: cosine
  weight_decay: 0.1
