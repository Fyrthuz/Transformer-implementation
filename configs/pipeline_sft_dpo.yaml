name: sft_dpo_pipeline
stages:
  - name: "Pre-training (TinyStories)"
    command: pretrain
    config: configs/pretrain_tinystories.yaml
  - name: "SFT (Alpaca)"
    command: sft
    config: configs/sft_alpaca.yaml
  - name: "DPO (UltraFeedback)"
    command: dpo
    config: configs/dpo_ultrafeedback.yaml
